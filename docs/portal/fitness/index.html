<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Tracker</title>

  <!-- Theme flash prevention -->
  <script>
    (function() {
      var saved = localStorage.getItem('portal_theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Fonts: Barlow Condensed (headings) + Barlow (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS v4 Browser CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Portal Home Button (hidden hover-reveal) -->
  <a href="../" class="portal-home-btn" title="Back to Portal" aria-label="Back to Portal">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </a>

  <div class="layout">

    <!-- ═══ Sidebar (Desktop + Tablet) ═══ -->
    <nav class="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar-logo">
        <h1>Fitness Tracker</h1>
        <span>MOLTBOT Dashboard</span>
      </div>

      <div class="nav-section">Navegacion</div>

      <div class="nav-item active" data-page="home" onclick="navigate('home', this)" role="button" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Inicio</span>
      </div>

      <div class="nav-item" data-page="diet" onclick="navigate('diet', this)" role="button" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
        <span>Dieta</span>
      </div>

      <div class="nav-item" data-page="gym" onclick="navigate('gym', this)" role="button" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/>
          <rect x="6" y="7" width="4" height="10" rx="1"/><rect x="14" y="7" width="4" height="10" rx="1"/>
          <line x1="10" y1="12" x2="14" y2="12"/>
        </svg>
        <span>Gym</span>
      </div>

      <div class="nav-item" data-page="body" onclick="navigate('body', this)" role="button" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="3"/><path d="M12 8v4m-3 4l3-4 3 4m-7 0v4m8-4v4"/>
        </svg>
        <span>Cuerpo</span>
      </div>

      <div class="nav-item" data-page="plan" onclick="navigate('plan', this)" role="button" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
        </svg>
        <span>Plan & Metas</span>
      </div>

      <div class="nav-section" style="margin-top:auto">Vista</div>
      <div class="view-toggle">
        <button data-mode="daily" onclick="toggleView('daily')">Dia</button>
        <button data-mode="weekly" class="active" onclick="toggleView('weekly')">Semana</button>
      </div>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <span>Cambiar tema</span>
        </button>
      </div>
    </nav>

    <!-- ═══ Main Content ═══ -->
    <main class="main">
      <!-- Date Navigation -->
      <div class="date-nav">
        <button class="btn btn-sm" onclick="navigateDate(-1)" aria-label="Previous">&larr;</button>
        <span class="date-display" id="date-display"></span>
        <button class="btn btn-sm" onclick="navigateDate(1)" aria-label="Next">&rarr;</button>
        <button class="btn btn-sm" onclick="goToToday()">Hoy</button>
      </div>

      <!-- Pages -->
      <div id="page-home" class="page active">
        <div id="home-content"><div class="loading">Cargando...</div></div>
      </div>
      <div id="page-diet" class="page">
        <div id="diet-content"><div class="loading">Cargando...</div></div>
      </div>
      <div id="page-gym" class="page">
        <div id="gym-content"><div class="loading">Cargando...</div></div>
      </div>
      <div id="page-body" class="page">
        <div id="body-content"><div class="loading">Cargando...</div></div>
      </div>
      <div id="page-plan" class="page">
        <div id="plan-content"><div class="loading">Cargando...</div></div>
      </div>
    </main>
  </div>

  <!-- ═══ Bottom Navigation (Mobile) ═══ -->
  <nav class="bottom-nav" role="navigation" aria-label="Mobile navigation">
    <div class="bottom-nav-inner">
      <div class="bottom-nav-item active" data-page="home" onclick="navigateMobile('home', this)" role="button" tabindex="0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Inicio
      </div>
      <div class="bottom-nav-item" data-page="diet" onclick="navigateMobile('diet', this)" role="button" tabindex="0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
        Dieta
      </div>
      <div class="bottom-nav-item" data-page="gym" onclick="navigateMobile('gym', this)" role="button" tabindex="0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/>
          <rect x="6" y="7" width="4" height="10" rx="1"/><rect x="14" y="7" width="4" height="10" rx="1"/>
          <line x1="10" y1="12" x2="14" y2="12"/>
        </svg>
        Gym
      </div>
      <div class="bottom-nav-item" data-page="body" onclick="navigateMobile('body', this)" role="button" tabindex="0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="3"/><path d="M12 8v4m-3 4l3-4 3 4m-7 0v4m8-4v4"/>
        </svg>
        Cuerpo
      </div>
      <div class="bottom-nav-item" data-page="plan" onclick="navigateMobile('plan', this)" role="button" tabindex="0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/>
        </svg>
        Plan
      </div>
    </div>
  </nav>

  <!-- Scripts -->
  <script>window.PORTAL_SERVICE='fitness';</script>
  <script src="../portal-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
